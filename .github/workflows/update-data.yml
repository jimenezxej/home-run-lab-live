name: Update Home Run Lab Data

on:
  workflow_dispatch:
  schedule:
    # GitHub does not guarantee exact timing. This is a free best-effort cloud updater.
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Build slate and HR feed
        run: |
          python pipeline.py || true
          python backend/live_hr_tracker.py --include-yesterday || true
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/slate.json app/hr-history.json app/live-events.json || true
          git diff --cached --quiet && echo "No changes" || git commit -m "Update Home Run Lab data"
          git push
