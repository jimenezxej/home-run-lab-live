name: Home Run Lab Cloud Update

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: home-run-lab-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pybaseball pandas requests beautifulsoup4 lxml

      - name: Patch project-page paths
        run: python scripts/patch_github_pages_paths.py

      - name: Build current data and site
        run: python scripts/cloud_build.py

      - name: Save refreshed generated data
        run: |
          git config user.name "home-run-lab-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data frontend/src/app.js app.js 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Automated Home Run Lab data refresh"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
