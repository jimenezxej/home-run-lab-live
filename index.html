<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Home Run Lab 4.6</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

      <div class="brand-mark"><span></span></div>

      <button data-tab="hrlab">Home Run Lab</button>

      <button data-tab="tracker">HR Tracker</button>
      <button data-tab="ai">AI Report</button>
      <button data-tab="guide">Model Guide</button>
      <button data-tab="glossary">Glossary</button>

  </header>

  <main class="main">
    <section id="content"></section>

  <script src="app.js"></script>

</html>
