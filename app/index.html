<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d13" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>The Home Run Lab 3.0</title>
  <style>
    :root{--bg:#080b11;--panel:#121722;--panel2:#171e2b;--line:#293246;--ink:#edf1f8;--muted:#9aa5ba;--faint:#667087;--gold:#f6bd46;--green:#2fd178;--blue:#5a95ff;--red:#f0525f;--orange:#ff9b4a;--yellow:#e6d04f}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#11182a 0,#080b11 42%,#05070a 100%);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.wrap{max-width:1240px;margin:0 auto;padding:18px 14px 70px}.top{display:flex;gap:14px;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;border-bottom:1px solid var(--line);padding:10px 0 16px;margin-bottom:14px}.kicker{font-size:11px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;font-weight:700}.title{font-size:40px;line-height:1;margin:4px 0;font-weight:850;letter-spacing:-.03em}.sub{color:var(--muted);font-size:13px}.panel{background:rgba(18,23,34,.94);border:1px solid var(--line);border-radius:16px;box-shadow:0 16px 50px rgba(0,0,0,.25)}.card{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:13px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:12px}.tabs{display:flex;gap:8px;overflow-x:auto;padding:6px 0 14px;position:sticky;top:0;background:linear-gradient(var(--bg),rgba(8,11,17,.86));z-index:10}.tab{white-space:nowrap;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:999px;padding:9px 12px;font-weight:700;font-size:13px;cursor:pointer}.tab.active{border-color:var(--gold);color:var(--gold);background:#211b0f}.section{display:none}.section.active{display:block}.section h2{font-size:22px;margin:0 0 10px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:12px}.score{font-weight:900;font-size:34px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.good{color:var(--green)}.blue{color:var(--blue)}.gold{color:var(--gold)}.bad{color:var(--red)}.orange{color:var(--orange)}button{font:inherit}select,input{background:#0f1420;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #20293b;text-align:left;font-size:13px;white-space:nowrap}th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:var(--panel);position:sticky;top:52px}tr:hover td{background:#151d2a}.scroll{overflow:auto;max-height:620px;border:1px solid var(--line);border-radius:12px}.bar{height:9px;background:#20283a;border-radius:99px;overflow:hidden}.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:inherit}.mini{font-size:12px;color:var(--muted);line-height:1.45}.bigalert{border-color:#6b5222;background:linear-gradient(135deg,#1a1620,#171e2b)}.windbox{display:flex;gap:12px;align-items:center}.windsvg{width:118px;height:118px;background:#0c111b;border:1px solid var(--line);border-radius:999px}.fieldsvg{width:100%;max-width:260px;height:170px;background:#0c111b;border:1px solid var(--line);border-radius:14px}.footer{margin-top:18px;color:var(--faint);font-size:12px}.empty{padding:28px;text-align:center;color:var(--muted)}.badge{border:1px solid var(--line);border-radius:8px;padding:3px 7px;font-size:12px;font-weight:800}.rowbtn{cursor:pointer}.details{display:none;background:#0f1420}.details.open{display:table-row}.note{color:var(--muted);font-size:13px;line-height:1.6}.danger{background:#25141a;border-color:#59313a}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.install{border:1px solid var(--gold);background:#221b0e;color:var(--gold);border-radius:10px;padding:9px 12px;font-weight:800;cursor:pointer}@media(max-width:700px){.title{font-size:31px}.tabs{top:0}.score{font-size:29px}th{top:50px}.wrap{padding-left:10px;padding-right:10px}.hide-sm{display:none}}
  </style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div><div class="kicker">Home Run Lab 3.0 · no demo mode</div><div class="title">THE HOME RUN <span class="gold">LAB</span></div><div id="meta" class="sub">Loading live slate…</div></div>
    <div class="card"><div class="mini">PWA/iPhone ready · slate + live HR tracker</div><button id="installBtn" class="install" style="display:none">Install App</button></div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="app"></main>
  <div class="footer">Data files: <span class="mono">slate.json</span>, <span class="mono">hr-history.json</span>, <span class="mono">live-events.json</span>. If this says no data, run <span class="mono">python pipeline.py</span>.</div>
</div>
<script>
'use strict';
const $ = s => document.querySelector(s);
const app = $('#app');
const tabsEl = $('#tabs');
const fmt = (v,n=1,d='—') => (v===null||v===undefined||Number.isNaN(+v))?d:(+v).toFixed(n);
const nz = (v,d=0)=> (v===null||v===undefined||Number.isNaN(+v))?d:+v;
const clamp=(x,a=0,b=100)=>Math.max(a,Math.min(b,x));
const norm=(v,lo,hi,d=50)=>v==null?d:clamp(((+v-lo)/(hi-lo))*100);
const color=s=>s>=80?'good':s>=68?'blue':s>=55?'gold':s>=42?'orange':'bad';
const safe = s => String(s ?? '').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let state={slate:null, rows:[], history:[], live:[], active:'Board'};
async function j(url, fallback){try{const r=await fetch(url+'?t='+Date.now(),{cache:'no-store'}); if(!r.ok) throw Error(r.status); return await r.json()}catch(e){console.warn(url,e); return fallback}}
function envScore(g,parks){const p=parks?.[g.park]||{}; const park=norm(p.hr,84,118); const temp=norm(g.temp,48,98); const w=nz(g.wind,0); const dir=g.windDir||''; const wind=dir.startsWith('Out')?50+w*3:dir.startsWith('In')?50-w*3.2:50+w*.3; const alt=norm(p.alt,0,5200)*.6+20; return Math.round(clamp(park*.42+temp*.22+clamp(wind)*.22+alt*.1+50*.04));}
function gopher(p){if(!p||p.name==='TBD')return 50; return Math.round(clamp(norm(p.barrelA,4,13)*.25+norm(p.hardHitA,32,50)*.18+norm(p.hr9,.6,2.3)*.22+norm(p.fb,26,48)*.15+(100-norm(p.stuff,85,117))*.1+norm(p.xera,2.6,6.2)*.1));}
function hpi(h){return Math.round(clamp(norm(h.barrel,4,19)*.28+norm(h.hardHit,30,58)*.16+norm(h.avgEV,86,94)*.12+norm(h.maxEV,105,118)*.13+norm(h.pullAir,12,38)*.18+norm(h.xslg,.35,.65)*.13));}
function matchup(h,p){if(!p||p.name==='TBD')return 50; let mix=50, seen=0; (p.mix||[]).forEach(m=>{const v=(h.vsPitch||{})[m.pitch]; if(v){mix += (norm(v.slg,.32,.7)-50)*(m.pct/100); seen+=m.pct}}); const platoon=h.hand==='S'?62:(h.hand!==p.hand?72:38); return Math.round(clamp(mix*.44+platoon*.26+norm(h.pullAir,12,38)*.12+norm(h.zoneContact,74,93)*.08+norm(h.last14,0,100)*.1));}
function assemble(slate){const games=slate.games||[], parks=slate.parks||{}; const teamGame={}, opp={}; games.forEach(g=>{teamGame[g.away]=g;teamGame[g.home]=g;opp[g.away]=g.home;opp[g.home]=g.away}); return (slate.hitters||[]).map(h=>{const g=teamGame[h.team]; if(!g)return null; const p=(slate.pitchers||{})[opp[h.team]]||{name:'TBD',mix:[]}; const H=hpi(h),P=gopher(p),M=matchup(h,p),E=envScore(g,parks); const edge=Math.round(clamp(H*.33+P*.28+M*.24+E*.15)); const longshot=Math.round(clamp(P*.31+M*.31+E*.18+norm(h.maxEV,105,118)*.12+norm(h.last7,0,100)*.08-(h.order&&h.order<=4?6:0)+(h.order>=6?7:0))); const pitchSleeper=Math.round(clamp(M*.48+P*.25+H*.17+E*.1)); const hotLong=Math.round(clamp(norm(h.last7,0,100)*.33+norm(h.last14,0,100)*.25+P*.2+E*.12+(h.order>=6?10:0)));
return {...h,game:g,opp:opp[h.team],pitcher:p,idx:{hpi:H,pvi:P,mi:M,ei:E},edge,longshot,pitchSleeper,hotLong,prob:(.018+edge/100*.11)} }).filter(Boolean).sort((a,b)=>b.edge-a.edge)}
function tabs(){const list=['Board','Sharp Longshots','Pitch-Type Sleepers','Hot Longshots','Pitcher Lab','Weather Lab','HR Tracker']; tabsEl.innerHTML=list.map(t=>`<button class="tab ${state.active===t?'active':''}" data-tab="${t}">${t}</button>`).join(''); tabsEl.onclick=e=>{const b=e.target.closest('.tab'); if(b){state.active=b.dataset.tab; render()}}}
function scoreBox(label,v,sub=''){return `<div class="card"><div class="mini">${label}</div><div class="score ${color(v)}">${v??'—'}</div><div class="mini">${sub}</div></div>`}
function hitterCard(h,metric='edge'){return `<div class="card ${metric==='longshot'?'bigalert':''}"><div style="display:flex;justify-content:space-between;gap:8px"><div><b>${safe(h.name)}</b> <span class="mini">${h.hand||''}HB · ${h.team} · bats ${h.order||'—'}</span><div class="mini">vs ${safe(h.pitcher.name)} ${h.pitcher.hand||''}HP · ${safe((state.slate.parks||{})[h.game.park]?.name||h.game.park)}</div></div><div class="score ${color(h[metric])}">${h[metric]}</div></div><div class="grid" style="grid-template-columns:repeat(4,1fr);margin-top:10px;gap:8px"><div class="mini">HPI<br><b>${h.idx.hpi}</b></div><div class="mini">PVI<br><b>${h.idx.pvi}</b></div><div class="mini">Match<br><b>${h.idx.mi}</b></div><div class="mini">ENV<br><b>${h.idx.ei}</b></div></div><div class="mini" style="margin-top:10px">Barrel ${fmt(h.barrel)}% · HardHit ${fmt(h.hardHit)}% · PullAir ${fmt(h.pullAir)}% · xSLG ${fmt(h.xslg,3)} · HR prob ${(h.prob*100).toFixed(1)}%</div></div>`}
function board(){let rows=state.rows; return `<section class="section active"><h2>Full Hitter Board</h2><div class="grid">${scoreBox('Hitters modeled',rows.length,'live slate rows')}${scoreBox('Top HR Edge',rows[0]?.edge,'best all-around spot')}${scoreBox('Best Longshot', [...rows].sort((a,b)=>b.longshot-a.longshot)[0]?.longshot,'non-obvious angle')}</div><div class="scroll" style="margin-top:12px"><table><thead><tr><th>Hitter</th><th>Team</th><th>Ord</th><th>Pitcher</th><th>HR Edge</th><th>Longshot</th><th>Pitch Fit</th><th>Hot LS</th><th>Barrel</th><th>xSLG</th></tr></thead><tbody>${rows.map(h=>`<tr class="rowbtn"><td><b>${safe(h.name)}</b></td><td>${h.team}</td><td>${h.order||'—'}</td><td>${safe(h.pitcher.name)}</td><td><span class="badge ${color(h.edge)}">${h.edge}</span></td><td><span class="badge ${color(h.longshot)}">${h.longshot}</span></td><td>${h.pitchSleeper}</td><td>${h.hotLong}</td><td>${fmt(h.barrel)}%</td><td>${fmt(h.xslg,3)}</td></tr>`).join('')}</tbody></table></div></section>`}
function category(title,key,desc,filter=()=>true){const rows=[...state.rows].filter(filter).sort((a,b)=>b[key]-a[key]).slice(0,18); return `<section class="section active"><h2>${title}</h2><p class="note">${desc}</p><div class="grid">${rows.map(h=>hitterCard(h,key)).join('')||'<div class="empty panel">No players matched yet. Re-run closer to first pitch or after lineups confirm.</div>'}</div></section>`}
function pitcherLab(){const ps=Object.values(state.slate.pitchers||{}).filter(p=>p&&p.name&&p.name!=='TBD').map(p=>({...p,pvi:gopher(p)})).sort((a,b)=>b.pvi-a.pvi); return `<section class="section active"><h2>Pitcher Vulnerability Lab</h2><div class="grid">${ps.slice(0,24).map(p=>`<div class="card"><div style="display:flex;justify-content:space-between"><div><b>${safe(p.name)}</b><div class="mini">${p.team||''} · ${p.hand||''}HP</div></div><div class="score ${color(p.pvi)}">${p.pvi}</div></div>${bar('HR/9',norm(p.hr9,.6,2.3),fmt(p.hr9,2))}${bar('Barrel allowed',norm(p.barrelA,4,13),fmt(p.barrelA)+'%')}${bar('Hard-hit allowed',norm(p.hardHitA,32,50),fmt(p.hardHitA)+'%')}${bar('Fly ball',norm(p.fb,26,48),fmt(p.fb)+'%')}<div class="mini">Pitch mix: ${(p.mix||[]).slice(0,4).map(m=>`${m.pitch} ${m.pct}%`).join(' · ')||'pending'}</div></div>`).join('')}</div></section>`}
function bar(label,pct,val){return `<div style="margin:9px 0"><div class="mini" style="display:flex;justify-content:space-between"><span>${label}</span><b>${val}</b></div><div class="bar"><i style="width:${clamp(pct)}%"></i></div></div>`}
function windArrow(g){const dir=g.windDir||'Calm'; let deg=0; if(dir.startsWith('Out'))deg=0; else if(dir.startsWith('In'))deg=180; else if(dir.startsWith('Cross'))deg=90; return `<svg class="windsvg" viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="#101725" stroke="#293246"/><text x="60" y="18" text-anchor="middle" fill="#9aa5ba" font-size="10">CF</text><text x="18" y="65" fill="#9aa5ba" font-size="10">LF</text><text x="100" y="65" fill="#9aa5ba" font-size="10">RF</text><g transform="translate(60 60) rotate(${deg})"><line x1="0" y1="34" x2="0" y2="-30" stroke="#f6bd46" stroke-width="7" stroke-linecap="round"/><path d="M -13 -20 L 0 -38 L 13 -20" fill="none" stroke="#f6bd46" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></g><text x="60" y="104" text-anchor="middle" fill="#edf1f8" font-size="12" font-weight="700">${nz(g.wind,0)} mph</text></svg>`}
function field(g){return `<svg class="fieldsvg" viewBox="0 0 260 170"><path d="M130 155 L20 50 A150 150 0 0 1 240 50 Z" fill="#142a1d" stroke="#293246"/><path d="M130 155 L70 95 L130 45 L190 95 Z" fill="#8a5d2f" opacity=".65"/><path d="M130 155 L20 50 M130 155 L240 50" stroke="#f3f3dc" opacity=".55"/><text x="130" y="25" text-anchor="middle" fill="#9aa5ba" font-size="11">${safe((state.slate.parks||{})[g.park]?.name||g.park)}</text></svg>`}
function weatherLab(){const games=state.slate.games||[]; return `<section class="section active"><h2>Weather + Ballpark Lab</h2><p class="note">Visual wind arrows: arrow toward center field means blowing out; arrow toward home plate means blowing in; sideways means crosswind.</p><div class="grid">${games.map(g=>`<div class="card"><b>${g.away} @ ${g.home}</b><div class="mini">${safe((state.slate.parks||{})[g.park]?.name||g.park)} · ${g.time||''}</div><div class="windbox"><div>${windArrow(g)}</div><div>${field(g)}</div></div><div class="mini">Temp ${g.temp??'—'}° · humidity ${g.humidity??'—'}% · wind ${g.wind??'—'} mph ${safe(g.windDir||'')} · Environment <b class="${color(envScore(g,state.slate.parks||{}))}">${envScore(g,state.slate.parks||{})}</b></div></div>`).join('')}</div></section>`}
function tracker(){const hist=state.history||[], live=state.live||[]; const dates=[...new Set(hist.map(x=>x.date).filter(Boolean))].sort().reverse(); const latest=live.length?live:hist.filter(x=>x.date===dates[0]); const repeat=Object.entries(hist.reduce((a,h)=>{a[h.batter]=(a[h.batter]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1]).slice(0,12); return `<section class="section active"><h2>Live HR Tracker</h2><div class="grid">${scoreBox('Today live HR',live.length,'updates from live tracker')}${scoreBox('History HR',hist.length,'saved in hr-history.json')}${scoreBox('Repeat hitters',repeat.filter(x=>x[1]>1).length,'streak watch')}</div><div class="card" style="margin-top:12px"><b>Live / latest home runs</b><div class="scroll" style="margin-top:8px;max-height:360px"><table><thead><tr><th>Date</th><th>Hitter</th><th>Team</th><th>Pitcher</th><th>Inning</th><th>EV</th><th>LA</th><th>Dist</th><th>Game</th></tr></thead><tbody>${latest.map(h=>`<tr><td>${h.date||'—'}</td><td><b>${safe(h.batter)}</b></td><td>${h.team||'—'}</td><td>${safe(h.pitcher)}</td><td>${h.halfInning||''} ${h.inning||''}</td><td>${fmt(h.exitVelocity)}</td><td>${fmt(h.launchAngle)}</td><td>${fmt(h.distance,0)}</td><td>${safe(h.game)}</td></tr>`).join('')||'<tr><td colspan="9" class="empty">No live HRs yet. Start tracker with run-chromebook.sh and keep app running during games.</td></tr>'}</tbody></table></div></div><div class="grid" style="margin-top:12px"><div class="card"><b>Streak watch</b>${repeat.map(([p,c])=>`<div class="mini" style="display:flex;justify-content:space-between;border-bottom:1px solid #20293b;padding:7px 0"><span>${safe(p)}</span><b>${c}</b></div>`).join('')||'<div class="mini">No history yet.</div>'}</div><div class="card"><b>How to keep this live</b><p class="note">Leave the Chromebook server running. The tracker checks MLB feeds every 2 minutes and updates <span class="mono">hr-history.json</span>. Your app auto-refreshes the file every 60 seconds.</p></div></div></section>`}
function render(){tabs(); if(!state.slate || !(state.slate.hitters||[]).length){app.innerHTML=`<div class="panel empty"><h2>No live slate data yet</h2><p>Run <span class="mono">cd ~/homerun-lab && .venv/bin/python pipeline.py</span>, then refresh. This app intentionally does not use demo players.</p></div>`;return} const m={Board:board,'Sharp Longshots':()=>category('Sharp Analytical Longshots','longshot','Players with non-obvious analytical angles: pitcher vulnerability, pitch fit, park/weather, max EV, and lower-lineup leverage. This intentionally avoids simply ranking famous cleanup hitters.',h=>h.order>=5||h.longshot>=65),'Pitch-Type Sleepers':()=>category('Pitch-Type Mismatch Sleepers','pitchSleeper','Hitters whose profile fits the opposing pitcher’s pitch mix, platoon, and contact weakness better than their overall fame/reputation suggests.'),'Hot Longshots':()=>category('Hot Lower-Profile Longshots','hotLong','Recent-form and lower-lineup candidates that may be heating up before the market fully reacts.',h=>h.order>=5||h.hotLong>=65),'Pitcher Lab':pitcherLab,'Weather Lab':weatherLab,'HR Tracker':tracker}; app.innerHTML=(m[state.active]||board)();}
async function load(){const [slate,hist,live]=await Promise.all([j('slate.json',{hitters:[],games:[],pitchers:{},parks:{}}),j('hr-history.json',{homeRuns:[]}),j('live-events.json',{events:[]})]); state.slate=slate; state.rows=assemble(slate); state.history=hist.homeRuns||[]; state.live=live.events||[]; $('#meta').textContent = slate.generatedAt ? `${slate.date||''} · ${state.rows.length} hitters · updated ${new Date(slate.generatedAt).toLocaleString()}` : 'No generated slate yet — run pipeline.py'; render()}
load(); setInterval(load,60000);
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
let deferredPrompt; window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('#installBtn').style.display='inline-block'}); $('#installBtn').onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt(); deferredPrompt=null; $('#installBtn').style.display='none'}};
</script>
</body></html>
