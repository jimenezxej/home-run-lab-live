<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1f3a" />
  <title>Home Run Lab</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css?v=9.0.0" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div><p class="eyebrow">THE HOME RUN LAB</p><h1>Game Intelligence</h1></div>
      <div class="live-chip" id="updateChip">Loading…</div>
    </header>
    <main>
      <section class="hero">
        <div><p class="eyebrow">TODAY'S SLATE</p><h2 id="slateTitle">Today's Games</h2><p id="slateSubtitle">Choose a matchup to see hitters, pitchers, weather, and model reasoning together.</p></div>
        <button class="ghost-btn" id="refreshBtn" type="button">Refresh</button>
      </section>
      <section class="overview-grid" id="overviewGrid"></section>
      <section class="panel">
        <div class="section-head"><div><p class="eyebrow">GAME BOARD</p><h2>Choose a game</h2></div><select id="gameSelect" aria-label="Select game"></select></div>
        <div class="game-strip" id="gameStrip"></div>
      </section>
      <section id="gameView" class="game-view"></section>
    </main>
  </div>
  <div class="modal-backdrop hidden" id="playerModal" role="dialog" aria-modal="true">
    <div class="modal-card"><button class="modal-close" id="closeModal" aria-label="Close">×</button><div id="playerModalBody"></div></div>
  </div>
  <script src="app.js?v=9.0.0"></script>
</body>
</html>
